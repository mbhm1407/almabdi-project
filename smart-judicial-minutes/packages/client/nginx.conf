server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers. The app is embedded in the Teams webview.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.office.com https://*.microsoft.com;" always;

  # Cache hashed assets aggressively; never cache the HTML shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
