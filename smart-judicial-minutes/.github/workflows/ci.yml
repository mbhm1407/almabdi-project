name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: smart-judicial-minutes

jobs:
  build-test:
    name: Lint, typecheck, test, coverage & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-judicial-minutes/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build shared package
        run: npm run build --workspace @smj/shared

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Teams manifest
        run: node scripts/validate-manifest.mjs

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            smart-judicial-minutes/packages/server/coverage
            smart-judicial-minutes/packages/client/coverage
          if-no-files-found: ignore

      - name: Build
        run: npm run build

      - name: Package Teams app
        run: node scripts/package-teams-app.mjs

      - name: Upload Teams app package
        uses: actions/upload-artifact@v4
        with:
          name: teams-app-package
          path: smart-judicial-minutes/teams-app/appPackage.zip
          if-no-files-found: error

  security-audit:
    name: Dependency & security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-judicial-minutes/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      # Report production-dependency vulnerabilities. Non-blocking so a new
      # advisory never breaks delivery, but always visible in the run log.
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high || true

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f packages/server/Dockerfile -t smj-server .
      - name: Build client image
        run: docker build -f packages/client/Dockerfile -t smj-client .
