name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: smart-judicial-minutes/package-lock.json

      - name: Install dependencies
        working-directory: smart-judicial-minutes
        run: npm ci || npm install

      - name: Build shared package
        working-directory: smart-judicial-minutes
        run: npm run build --workspace @smj/shared

      - name: Lint
        working-directory: smart-judicial-minutes
        run: npm run lint

      - name: Prettier check
        working-directory: smart-judicial-minutes
        run: npm run format:check

      - name: Typecheck
        working-directory: smart-judicial-minutes
        run: npm run typecheck

      - name: Test
        working-directory: smart-judicial-minutes
        run: npm test

      - name: Build
        working-directory: smart-judicial-minutes
        run: npm run build

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        working-directory: smart-judicial-minutes
        run: docker build -f packages/server/Dockerfile -t smj-server .
      - name: Build client image
        working-directory: smart-judicial-minutes
        run: docker build -f packages/client/Dockerfile -t smj-client .
